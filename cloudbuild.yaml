steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - ./backend

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - --image
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --min-instances
      - "1"
      - --set-secrets
      - >-
        OPENAI_API_KEY=OPENAI_API_KEY:latest,
        GOOGLE_SHEET_ID=GOOGLE_SHEET_ID:latest,
        GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT=GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT:latest,
        GOOGLE_DRIVE_FOLDER_ID=GOOGLE_DRIVE_FOLDER_ID:latest,
        FRONTEND_URL=FRONTEND_URL:latest,
        WAUMFY_WEBHOOK_SECRET=WAUMFY_WEBHOOK_SECRET:latest,
        WAUMFY_SEND_URL=WAUMFY_SEND_URL:latest,
        WAUMFY_API_KEY=WAUMFY_API_KEY:latest,
        DB_HOST=DB_HOST:latest,
        DB_NAME=DB_NAME:latest,
        DB_USER=DB_USER:latest,
        DB_PASSWORD=DB_PASSWORD:latest

substitutions:
  _REGION: asia-south1
  _REPO: whatsapp-delegation
  _SERVICE: whatsapp-backend

options:
  logging: CLOUD_LOGGING_ONLY
